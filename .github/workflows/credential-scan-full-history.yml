# Manual / reporting only — not a required branch-protection check.
# Full history may surface pre-boundary commits; findings require maintainer review (no silent history rewrite).
name: Credential Scan (Full History, Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-history-reporting:
    name: Credential scan — full git history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned)
        shell: bash
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" -o "${tarball}"
          tar -xzf "${tarball}" gitleaks
          chmod +x gitleaks
      - name: Full history credential scan (gitleaks detect)
        shell: bash
        run: |
          set -euo pipefail
          ./gitleaks detect --source . --redact --config .gitleaks.toml --verbose
