  release-dependency-freeze:
    name: Release Dependency Freeze
    runs-on: ubuntu-latest
    # Freeze only validates PR merges. Pushes to main after a sanctioned dep bump would
    # legitimately touch pyproject/requirements — re-checking HEAD~1..HEAD would false-fail main CI.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2  # Need previous commit for comparison
      - name: Check dependency files unchanged
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          # Maintainer-documented bypass for sanctioned changes (CVE fixes, toolchain pins).
          if echo "${PR_BODY:-}" | grep -qF 'RELDEPS-EXCEPTION'; then
            echo "release-deps-exception: RELDEPS-EXCEPTION token in PR body; skipping freeze."
            exit 0
          fi
          echo "Checking dependency files for changes..."
          if git diff HEAD~1 HEAD --name-only | grep -E "(pyproject\.toml|requirements.*\.txt)"; then
            echo "❌ Dependency files changed. Release lock requires frozen dependencies."
            echo "Changed files:"
            git diff HEAD~1 HEAD --name-only | grep -E "(pyproject\.toml|requirements.*\.txt)"
            exit 1
          fi
          echo "✅ Dependency files unchanged"

  release-contract-freeze:
    name: Release Contract Freeze
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check contract registry exists
        run: |
          if [ ! -f "contracts/CONTRACT_REGISTRY_v1.json" ]; then
            echo "❌ Contract registry not found. Run generate_contract_registry() first."
            exit 1
          fi
          echo "✅ Contract registry exists"
      - name: Validate contract registry
        run: |
          python << 'EOF'
          from pathlib import Path
          from renacechess.contracts.registry import validate_contract_registry
          
          registry_path = Path("contracts/CONTRACT_REGISTRY_v1.json")
          schemas_dir = Path("src/renacechess/contracts/schemas/v1")
          
          if not validate_contract_registry(registry_path, schemas_dir):
            print("❌ Contract registry validation failed")
            exit(1)
          
          print("✅ Contract registry validation passed")
          EOF
      - name: Check v1 schemas unchanged
        run: |
          echo "Checking v1 schema files for changes..."
          if git diff HEAD~1 HEAD --name-only | grep "src/renacechess/contracts/schemas/v1/.*\.schema\.json"; then
            echo "❌ v1 schema files changed. Release lock requires frozen contracts."
            echo "Changed files:"
            git diff HEAD~1 HEAD --name-only | grep "src/renacechess/contracts/schemas/v1/.*\.schema\.json"
            exit 1
          fi
          echo "✅ v1 schema files unchanged"
      - name: Check v1 models unchanged
        run: |
          echo "Checking for v1 model changes in contracts/models.py..."
          # This is a basic check - full validation requires registry comparison
          if git diff HEAD~1 HEAD --name-only | grep "src/renacechess/contracts/models.py"; then
            echo "⚠️  contracts/models.py changed. Verify no v1 model changes."
            # Don't fail here - registry validation above is the authoritative check
          fi
          echo "✅ v1 models check complete"

  release-proof-pack-verification:
    name: Release Proof Pack Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify proof pack exists
        run: |
          if [ ! -d "proof_pack_v1" ]; then
            echo "❌ Proof pack directory not found. M33 proof pack must exist for release."
            exit 1
          fi
          if [ ! -f "proof_pack_v1/proof_pack_manifest.json" ]; then
            echo "❌ Proof pack manifest not found."
            exit 1
          fi
          echo "✅ Proof pack directory and manifest exist"
      - name: Verify proof pack integrity
        run: |
          python << 'EOF'
          from pathlib import Path
          from renacechess.proof_pack.verify_proof_pack import verify_proof_pack
          
          proof_pack_dir = Path("proof_pack_v1")
          manifest_path = proof_pack_dir / "proof_pack_manifest.json"
          
          if not manifest_path.exists():
            print("❌ Proof pack manifest not found")
            exit(1)
          
          if not verify_proof_pack(proof_pack_dir):
            print("❌ Proof pack verification failed")
            exit(1)
          
          print("✅ Proof pack verification passed")
          EOF