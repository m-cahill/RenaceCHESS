name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ensure clean checkout
        run: git checkout HEAD -- .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: MyPy
        run: mypy src/renacechess

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Determine coverage mode
        id: coverage_check
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          
          # For PRs: use both absolute threshold AND overlap-set non-regression
          # For main: use absolute 90% threshold only
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "mode=both" >> $GITHUB_OUTPUT
            echo "threshold=90" >> $GITHUB_OUTPUT
            echo "Using both absolute threshold (90%) and overlap-set non-regression for PR: $BRANCH_NAME"
          else
            echo "mode=absolute" >> $GITHUB_OUTPUT
            echo "threshold=90" >> $GITHUB_OUTPUT
            echo "Using absolute threshold: 90% for branch: $BRANCH_NAME"
          fi
      - name: Generate baseline coverage XML
        if: steps.coverage_check.outputs.mode == 'both'
        shell: bash
        run: |
          # Get PR base commit SHA
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          echo "PR base SHA: $BASE_SHA"
          
          # Fetch and checkout base commit
          git fetch origin "$BASE_SHA" --depth=1
          git checkout "$BASE_SHA"
          
          # Install dependencies for base commit (in case they differ)
          python -m pip install --upgrade pip --quiet
          pip install -e ".[dev]" --quiet
          
          # Generate coverage XML at PR base
          python -m pytest --cov=src/renacechess --cov-report=xml --cov-fail-under=0 -q
          mv coverage.xml coverage-base.xml
          echo "✅ Baseline coverage XML generated"
          
          # Return to PR HEAD
          # Clean untracked files that may have been generated during baseline test run
          # But preserve coverage-base.xml by moving it to a safe location first
          mv coverage-base.xml /tmp/coverage-base.xml
          git clean -fd
          git checkout "${{ github.sha }}"
          # Restore coverage-base.xml
          mv /tmp/coverage-base.xml coverage-base.xml
          python -m pip install --upgrade pip --quiet
          pip install -e ".[dev]" --quiet
      - name: Run tests and generate PR coverage XML
        if: steps.coverage_check.outputs.mode == 'both'
        shell: bash
        run: |
          # Generate coverage XML at PR head
          python -m pytest --cov=src/renacechess --cov-report=xml --cov-fail-under=0 -q
          mv coverage.xml coverage-head.xml
          echo "✅ PR head coverage XML generated"
      - name: Compare overlap-set coverage
        if: steps.coverage_check.outputs.mode == 'both'
        shell: bash
        run: |
          python << 'EOF'
          import sys
          import xml.etree.ElementTree as ET

          def load_coverage(path):
              """Load coverage data from XML file, returning dict of filename -> coverage ratio."""
              try:
                  tree = ET.parse(path)
              except FileNotFoundError:
                  print(f"❌ Coverage file not found: {path}")
                  sys.exit(1)
              except ET.ParseError as e:
                  print(f"❌ Failed to parse coverage XML: {e}")
                  sys.exit(1)
              
              root = tree.getroot()
              # Aggregate coverage per file (a file can have multiple classes)
              file_stats = {}  # filename -> (total_lines, covered_lines)
              
              for cls in root.findall(".//class"):
                  filename = cls.attrib.get("filename", "")
                  if not filename:
                      continue
                  
                  lines = cls.find("lines")
                  if lines is None:
                      continue
                  
                  if filename not in file_stats:
                      file_stats[filename] = [0, 0]
                  
                  for line in lines.findall("line"):
                      file_stats[filename][0] += 1  # total
                      if int(line.attrib.get("hits", 0)) > 0:
                          file_stats[filename][1] += 1  # covered
              
              # Convert to coverage ratios
              coverage = {}
              for filename, (total, covered) in file_stats.items():
                  if total > 0:
                      coverage[filename] = covered / total
              
              return coverage

          # Load coverage from both XML files
          base = load_coverage("coverage-base.xml")
          head = load_coverage("coverage-head.xml")

          print(f"Files in base: {len(base)}")
          print(f"Files in head: {len(head)}")

          # Find regressions (files that existed in base and lost coverage in head)
          regressions = []
          overlap_count = 0

          for file, base_cov in base.items():
              if file not in head:
                  continue  # Deleted files are not regressions
              
              overlap_count += 1
              head_cov = head[file]
              
              # Use small epsilon for floating point comparison
              if head_cov + 1e-9 < base_cov:
                  regressions.append((file, base_cov, head_cov))

          print(f"Overlap files compared: {overlap_count}")

          if regressions:
              print("\n❌ Coverage regression detected:")
              for f, b, h in regressions:
                  print(f"  {f}: {b:.2%} → {h:.2%} (delta: {h-b:.2%})")
              sys.exit(1)

          print("\n✅ Coverage non-regression satisfied for existing files")
          print("   (New files are evaluated independently under milestone rules)")
          EOF
      - name: Run tests with absolute threshold
        if: steps.coverage_check.outputs.mode == 'absolute'
        shell: bash
        run: |
          python -m pytest --cov-fail-under=${{ steps.coverage_check.outputs.threshold }}
      - name: Run tests with absolute threshold (PR mode)
        if: steps.coverage_check.outputs.mode == 'both'
        shell: bash
        run: |
          python -m pytest --cov-fail-under=${{ steps.coverage_check.outputs.threshold }}
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

