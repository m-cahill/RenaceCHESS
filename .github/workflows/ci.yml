name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit bandit
      - name: Dependency vulnerability scan (pip-audit)
        run: |
          echo "Running pip-audit against installed environment..."
          # Ignore deferred torch vulnerabilities (see M23_audit.md TORCH-SEC-001)
          pip-audit --desc on --progress-spinner off \
            --ignore-vuln PYSEC-2025-41 \
            --ignore-vuln PYSEC-2024-259 \
            --ignore-vuln GHSA-3749-ghw9-m3mg \
            --ignore-vuln GHSA-887c-mr87-cxwp
      - name: Static security analysis (bandit)
        run: |
          echo "Running bandit SAST scan..."
          # Skip B614 (pytorch_load_save) - torch.save(state_dict) is safe pattern
          # Related to TORCH-SEC-001 deferral in M23_audit.md
          bandit -r src/renacechess -ll -ii --skip B614

  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ensure clean checkout
        run: git checkout HEAD -- .
      - name: Ruff format check
        run: ruff format --check .
      - name: Import boundary check
        run: lint-imports --config=importlinter_contracts.ini

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: MyPy
        run: mypy src/renacechess

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Determine coverage mode
        id: coverage_check
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          
          # For PRs: use both absolute threshold AND overlap-set non-regression
          # For main: use absolute 90% threshold only
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "mode=both" >> $GITHUB_OUTPUT
            echo "threshold=90" >> $GITHUB_OUTPUT
            echo "Using both absolute threshold (90%) and overlap-set non-regression for PR: $BRANCH_NAME"
          else
            echo "mode=absolute" >> $GITHUB_OUTPUT
            echo "threshold=90" >> $GITHUB_OUTPUT
            echo "Using absolute threshold: 90% for branch: $BRANCH_NAME"
          fi
      - name: Generate baseline coverage XML
        id: baseline_coverage
        if: steps.coverage_check.outputs.mode == 'both'
        continue-on-error: true
        shell: bash
        run: |
          # Get PR base commit SHA
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          echo "PR base SHA: $BASE_SHA"
          
          # Fetch and checkout base commit
          git fetch origin "$BASE_SHA" --depth=1
          git checkout "$BASE_SHA"
          
          # Install dependencies for base commit (in case they differ)
          python -m pip install --upgrade pip --quiet
          pip install -e ".[dev]" --quiet
          
          # Generate coverage XML at PR base (with branch coverage to match head)
          python -m pytest --cov=src/renacechess --cov-branch --cov-report=xml --cov-fail-under=0 -q
          mv coverage.xml coverage-base.xml
          echo "✅ Baseline coverage XML generated"
          
          # Return to PR HEAD
          # Clean untracked files that may have been generated during baseline test run
          # But preserve coverage-base.xml by moving it to a safe location first
          mv coverage-base.xml /tmp/coverage-base.xml
          git clean -fd
          git checkout "${{ github.sha }}"
          # Restore coverage-base.xml
          mv /tmp/coverage-base.xml coverage-base.xml
          python -m pip install --upgrade pip --quiet
          pip install -e ".[dev]" --quiet
      - name: Run tests and generate PR coverage XML
        if: steps.coverage_check.outputs.mode == 'both'
        shell: bash
        run: |
          # Generate coverage XML at PR head (with branch coverage to match baseline)
          python -m pytest --cov=src/renacechess --cov-branch --cov-report=xml --cov-fail-under=0 -q
          mv coverage.xml coverage-head.xml
          echo "✅ PR head coverage XML generated"
      - name: Skip overlap comparison (baseline failed)
        if: steps.coverage_check.outputs.mode == 'both' && steps.baseline_coverage.outcome != 'success'
        shell: bash
        run: |
          echo "⚠️ Baseline coverage generation failed (likely due to breaking changes in main)"
          echo "   Skipping overlap-set comparison for this PR"
          echo "   This is expected when main has incompatible dependencies/configs"
      - name: Compare overlap-set coverage
        if: steps.coverage_check.outputs.mode == 'both' && steps.baseline_coverage.outcome == 'success'
        shell: bash
        run: |
          python << 'EOF'
          import sys
          import xml.etree.ElementTree as ET

          def load_coverage(path):
              """Load coverage data from XML file, returning dict of filename -> coverage ratio."""
              try:
                  tree = ET.parse(path)
              except FileNotFoundError:
                  print(f"❌ Coverage file not found: {path}")
                  sys.exit(1)
              except ET.ParseError as e:
                  print(f"❌ Failed to parse coverage XML: {e}")
                  sys.exit(1)
              
              root = tree.getroot()
              # Aggregate coverage per file (a file can have multiple classes)
              file_stats = {}  # filename -> (total_lines, covered_lines)
              
              for cls in root.findall(".//class"):
                  filename = cls.attrib.get("filename", "")
                  if not filename:
                      continue
                  
                  lines = cls.find("lines")
                  if lines is None:
                      continue
                  
                  if filename not in file_stats:
                      file_stats[filename] = [0, 0]
                  
                  for line in lines.findall("line"):
                      file_stats[filename][0] += 1  # total
                      if int(line.attrib.get("hits", 0)) > 0:
                          file_stats[filename][1] += 1  # covered
              
              # Convert to coverage ratios
              coverage = {}
              for filename, (total, covered) in file_stats.items():
                  if total > 0:
                      coverage[filename] = covered / total
              
              return coverage

          # Load coverage from both XML files
          base = load_coverage("coverage-base.xml")
          head = load_coverage("coverage-head.xml")

          print(f"Files in base: {len(base)}")
          print(f"Files in head: {len(head)}")

          # Find regressions (files that existed in base and lost coverage in head)
          regressions = []
          overlap_count = 0

          for file, base_cov in base.items():
              if file not in head:
                  continue  # Deleted files are not regressions
              
              overlap_count += 1
              head_cov = head[file]
              
              # Allow up to 0.5% tolerance for minor fluctuations (formatting, line shifts)
              TOLERANCE = 0.005
              if head_cov + TOLERANCE < base_cov:
                  regressions.append((file, base_cov, head_cov))

          print(f"Overlap files compared: {overlap_count}")

          if regressions:
              print("\n❌ Coverage regression detected:")
              for f, b, h in regressions:
                  print(f"  {f}: {b:.2%} → {h:.2%} (delta: {h-b:.2%})")
              sys.exit(1)

          print("\n✅ Coverage non-regression satisfied for existing files")
          print("   (New files are evaluated independently under milestone rules)")
          EOF
      - name: Run tests with absolute threshold
        if: steps.coverage_check.outputs.mode == 'absolute'
        shell: bash
        run: |
          python -m pytest --cov-fail-under=${{ steps.coverage_check.outputs.threshold }}
      - name: Run tests with absolute threshold (PR mode)
        if: steps.coverage_check.outputs.mode == 'both'
        shell: bash
        run: |
          # Clean any existing .coverage files to avoid data type conflicts
          rm -f .coverage .coverage.*
          python -m pytest --cov=src/renacechess --cov-branch --cov-fail-under=${{ steps.coverage_check.outputs.threshold }}
      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload HTML coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

  perf-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run performance benchmarks
        run: |
          echo "Running performance benchmarks (no timing thresholds)..."
          python -m pytest tests/test_m23_perf_benchmarks.py -v --benchmark-only --benchmark-json=benchmark-results.json --no-cov
      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.json

  calibration-eval:
    name: Calibration Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run calibration evaluation
        run: |
          echo "Running calibration evaluation (M24)..."
          python -m renacechess.cli calibration \
            --manifest tests/fixtures/frozen_eval/manifest.json \
            --policy-id baseline.uniform_random \
            --out calibration-metrics.json
      - name: Validate calibration metrics schema
        run: |
          python << 'EOF'
          import json
          import sys
          from renacechess.contracts.models import CalibrationMetricsV1
          
          with open("calibration-metrics.json", "r") as f:
              data = json.load(f)
          
          try:
              metrics = CalibrationMetricsV1.model_validate(data)
              print(f"✅ Schema validation passed")
              print(f"   Version: {metrics.version}")
              print(f"   Overall samples: {metrics.overall_samples}")
              print(f"   Buckets: {len(metrics.by_elo_bucket)}")
          except Exception as e:
              print(f"❌ Schema validation failed: {e}")
              sys.exit(1)
          EOF
      - name: Upload calibration metrics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: calibration-metrics
          path: calibration-metrics.json

  recalibration-eval:
    name: Recalibration Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run calibration evaluation (before)
        run: |
          echo "Running calibration evaluation (before recalibration)..."
          python -m renacechess.cli calibration \
            --manifest tests/fixtures/frozen_eval/manifest.json \
            --policy-id baseline.uniform_random \
            --out calibration-metrics.json
      - name: Fit recalibration parameters
        run: |
          echo "Fitting recalibration parameters (M25)..."
          python -m renacechess.cli recalibration fit \
            --manifest tests/fixtures/frozen_eval/manifest.json \
            --calibration-metrics calibration-metrics.json \
            --policy-id baseline.uniform_random \
            --out recalibration-parameters.json
      - name: Validate recalibration parameters schema
        run: |
          python << 'EOF'
          import json
          import sys
          from renacechess.contracts.models import RecalibrationParametersV1
          
          with open("recalibration-parameters.json", "r") as f:
              data = json.load(f)
          
          try:
              params = RecalibrationParametersV1.model_validate(data)
              print(f"✅ Schema validation passed")
              print(f"   Version: {params.version}")
              print(f"   Buckets: {len(params.by_elo_bucket)}")
              for bucket in params.by_elo_bucket[:3]:  # Show first 3
                  print(f"   {bucket.elo_bucket}: outcome_temp={bucket.outcome_temperature:.3f}, policy_temp={bucket.policy_temperature:.3f}")
          except Exception as e:
              print(f"❌ Schema validation failed: {e}")
              sys.exit(1)
          EOF
      - name: Run recalibration evaluation (after)
        run: |
          echo "Running calibration evaluation with recalibration (M25)..."
          python -m renacechess.cli recalibration preview \
            --manifest tests/fixtures/frozen_eval/manifest.json \
            --calibration-metrics-before calibration-metrics.json \
            --recalibration-parameters recalibration-parameters.json \
            --policy-id baseline.uniform_random \
            --out calibration-delta.json
      - name: Validate calibration delta schema
        run: |
          python << 'EOF'
          import json
          import sys
          from renacechess.contracts.models import CalibrationDeltaArtifactV1
          
          with open("calibration-delta.json", "r") as f:
              data = json.load(f)
          
          try:
              delta = CalibrationDeltaArtifactV1.model_validate(data)
              print(f"✅ Schema validation passed")
              print(f"   Version: {delta.version}")
              print(f"   Buckets with deltas: {len(delta.by_elo_bucket)}")
          except Exception as e:
              print(f"❌ Schema validation failed: {e}")
              sys.exit(1)
          EOF
      - name: Upload recalibration artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: recalibration-artifacts
          path: |
            recalibration-parameters.json
            calibration-delta.json

  runtime-recalibration-guard:
    name: Runtime Recalibration Guard (M26)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Create minimal recalibration parameters for testing
        run: |
          python << 'EOF'
          import json
          from datetime import UTC, datetime
          from pathlib import Path
          
          # Create minimal test parameters
          params = {
              "version": "1.0",
              "generatedAt": datetime.now(UTC).isoformat(),
              "sourceCalibrationMetricsHash": "sha256:" + "0" * 64,
              "sourceManifestHash": "0" * 64,
              "policyId": "baseline.uniform_random",
              "byEloBucket": [
                  {
                      "eloBucket": "1200-1400",
                      "outcomeTemperature": 0.9,
                      "policyTemperature": 0.8,
                      "fitMethod": "grid_search",
                      "fitMetric": "nll"
                  }
              ],
              "determinismHash": "sha256:" + "0" * 64
          }
          
          Path("recalibration-parameters.json").write_text(
              json.dumps(params, indent=2),
              encoding="utf-8"
          )
          print("✅ Created recalibration-parameters.json")
          EOF
      - name: Create gate disabled artifact
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          
          gate_disabled = {
              "version": "1.0",
              "enabled": False,
              "scope": "both"
          }
          
          Path("gate-disabled.json").write_text(
              json.dumps(gate_disabled, indent=2),
              encoding="utf-8"
          )
          print("✅ Created gate-disabled.json")
          EOF
      - name: Create gate enabled artifact
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          
          gate_enabled = {
              "version": "1.0",
              "enabled": True,
              "parametersRef": "recalibration-parameters.json",
              "scope": "both"
          }
          
          Path("gate-enabled.json").write_text(
              json.dumps(gate_enabled, indent=2),
              encoding="utf-8"
          )
          print("✅ Created gate-enabled.json")
          EOF
      - name: Run M26 runtime recalibration guard tests
        run: |
          echo "Running M26 runtime recalibration guard tests..."
          echo ""
          echo "These tests validate runtime gating invariants:"
          echo "  ✅ Gate disabled → byte-identical output (no recalibration applied)"
          echo "  ✅ Gate enabled → recalibration applied (output differs)"
          echo "  ✅ Provenance metadata attached correctly"
          echo "  ✅ Scope enforcement (policy/outcome/both)"
          echo "  ✅ Gate validation (enabled=True requires parametersRef)"
          echo ""
          echo "Note: Runtime gating safety is proven via deterministic unit tests."
          echo "This job does NOT depend on dataset manifests (v1/v2) per M26 locked decision."
          echo "Runtime gating ≠ dataset evaluation."
          echo ""
          pytest tests/test_m26_runtime_recalibration.py -v --tb=short --no-cov

  runtime-recalibration-eval:
    name: Runtime Recalibration Evaluation (M27)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run runtime recalibration evaluation
        run: |
          echo "Running runtime recalibration evaluation (M27)..."
          python -m renacechess.cli eval runtime-recalibration \
            --gate tests/fixtures/frozen_eval/recalibration_gate.json \
            --params tests/fixtures/frozen_eval/recalibration_params.json \
            --frozen-eval-manifest tests/fixtures/frozen_eval/manifest.json \
            --out runtime-recal-out/
      - name: Validate report schema
        run: |
          python << 'EOF'
          import json
          import sys
          from renacechess.contracts.models import RuntimeRecalibrationReportV1
          
          with open("runtime-recal-out/runtime-recalibration-report.json", "r") as f:
              data = json.load(f)
          
          try:
              report = RuntimeRecalibrationReportV1.model_validate(data)
              print(f"✅ Report schema validation passed")
              print(f"   Version: {report.version}")
              print(f"   Total samples: {report.total_samples}")
              print(f"   Baseline Outcome ECE: {report.baseline_metrics.outcome_ece:.4f}")
              print(f"   Recalibrated Outcome ECE: {report.recalibrated_metrics.outcome_ece:.4f}")
          except Exception as e:
              print(f"❌ Report schema validation failed: {e}")
              sys.exit(1)
          EOF
      - name: Validate delta schema
        run: |
          python << 'EOF'
          import json
          import sys
          from renacechess.contracts.models import RuntimeRecalibrationDeltaV1
          
          with open("runtime-recal-out/runtime-recalibration-delta.json", "r") as f:
              data = json.load(f)
          
          try:
              delta = RuntimeRecalibrationDeltaV1.model_validate(data)
              print(f"✅ Delta schema validation passed")
              print(f"   Version: {delta.version}")
              print(f"   Elo buckets: {len(delta.by_elo_bucket)}")
              if delta.by_time_pressure_bucket:
                  print(f"   Time pressure buckets: {len(delta.by_time_pressure_bucket)}")
              print(f"   Top-1 Stability: {delta.overall.top1_stability:.1%}")
              print(f"   Top-3 Stability: {delta.overall.top3_stability:.1%}")
          except Exception as e:
              print(f"❌ Delta schema validation failed: {e}")
              sys.exit(1)
          EOF
      - name: Determinism check (run twice and compare hashes)
        run: |
          echo "Running determinism check..."
          
          # First run already done, get hash
          HASH1=$(python -c "import json; d=json.load(open('runtime-recal-out/runtime-recalibration-report.json')); print(d['determinismHash'])")
          echo "First run hash: $HASH1"
          
          # Second run
          rm -rf runtime-recal-out2/
          python -m renacechess.cli eval runtime-recalibration \
            --gate tests/fixtures/frozen_eval/recalibration_gate.json \
            --params tests/fixtures/frozen_eval/recalibration_params.json \
            --frozen-eval-manifest tests/fixtures/frozen_eval/manifest.json \
            --out runtime-recal-out2/
          
          HASH2=$(python -c "import json; d=json.load(open('runtime-recal-out2/runtime-recalibration-report.json')); print(d['determinismHash'])")
          echo "Second run hash: $HASH2"
          
          if [ "$HASH1" = "$HASH2" ]; then
            echo "✅ Determinism check passed"
          else
            echo "❌ Determinism check failed: hashes differ"
            exit 1
          fi
      - name: Upload runtime recalibration artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: runtime-recalibration-eval-artifacts
          path: |
            runtime-recal-out/runtime-recalibration-report.json
            runtime-recal-out/runtime-recalibration-delta.json

  runtime-recalibration-decision:
    name: Runtime Recalibration Decision (M28)
    runs-on: ubuntu-latest
    needs: runtime-recalibration-eval
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Download M27 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: runtime-recalibration-eval-artifacts
          path: m27-artifacts/
      - name: Create conservative policy artifact
        run: |
          mkdir -p m28-out/
          python << 'EOF'
          import json
          from datetime import datetime, timezone
          from renacechess.eval.recalibration_decision_runner import (
              create_conservative_policy,
              save_policy,
          )
          from pathlib import Path
          
          policy = create_conservative_policy()
          save_policy(policy, Path("m28-out/conservative_policy.json"))
          print("✅ Created conservative policy artifact")
          print(f"   Default enabled: {policy.default_enabled}")
          print(f"   Scope: {policy.scope}")
          print(f"   Bucket overrides: {len(policy.bucket_overrides)}")
          EOF
      - name: Run decision validation
        run: |
          echo "Running runtime recalibration decision (M28)..."
          python -m renacechess.cli eval runtime-recalibration-decision \
            --report m27-artifacts/runtime-recalibration-report.json \
            --delta m27-artifacts/runtime-recalibration-delta.json \
            --policy m28-out/conservative_policy.json \
            --out m28-out/decision.json
      - name: Validate decision schema
        run: |
          python << 'EOF'
          import json
          import sys
          from renacechess.contracts.models import RuntimeRecalibrationDecisionV1
          
          with open("m28-out/decision.json", "r") as f:
              data = json.load(f)
          
          try:
              decision = RuntimeRecalibrationDecisionV1.model_validate(data)
              print(f"✅ Decision schema validation passed")
              print(f"   Version: {decision.version}")
              print(f"   Outcome: {decision.decision_outcome}")
              print(f"   Activated: {decision.activated_bucket_count}/{decision.total_bucket_count}")
              print(f"   Validation: {'VALID' if decision.validation_result.valid else 'INVALID'}")
          except Exception as e:
              print(f"❌ Decision schema validation failed: {e}")
              sys.exit(1)
          EOF
      - name: Verify conservative policy result
        run: |
          python << 'EOF'
          import json
          import sys
          
          with open("m28-out/decision.json", "r") as f:
              decision = json.load(f)
          
          # Conservative policy should result in rejected outcome
          if decision["decisionOutcome"] != "rejected":
              print(f"❌ Conservative policy should yield 'rejected', got: {decision['decisionOutcome']}")
              sys.exit(1)
          
          if decision["activatedBucketCount"] != 0:
              print(f"❌ Conservative policy should have 0 activated buckets, got: {decision['activatedBucketCount']}")
              sys.exit(1)
          
          print("✅ Conservative policy correctly yields 'rejected' with 0 activated buckets")
          EOF
      - name: Determinism check
        run: |
          # Run decision a second time with same inputs
          python -m renacechess.cli eval runtime-recalibration-decision \
            --report m27-artifacts/runtime-recalibration-report.json \
            --delta m27-artifacts/runtime-recalibration-delta.json \
            --policy m28-out/conservative_policy.json \
            --out m28-out/decision_check.json
          
          # Compare determinism hashes
          HASH1=$(python -c "import json; d=json.load(open('m28-out/decision.json')); print(d['determinismHash'])")
          HASH2=$(python -c "import json; d=json.load(open('m28-out/decision_check.json')); print(d['determinismHash'])")
          
          echo "Hash 1: $HASH1"
          echo "Hash 2: $HASH2"
          
          if [ "$HASH1" = "$HASH2" ]; then
            echo "✅ Determinism check passed: hashes match"
          else
            echo "❌ Determinism check failed: hashes differ"
            exit 1
          fi
      - name: Upload M28 decision artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: runtime-recalibration-decision-artifacts
          path: |
            m28-out/conservative_policy.json
            m28-out/decision.json