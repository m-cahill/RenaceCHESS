name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ensure clean checkout
        run: git checkout HEAD -- .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: MyPy
        run: mypy src/renacechess

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Determine coverage mode and baseline
        id: coverage_check
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          
          # For M09 PR branches, use non-regression rule (compare against PR base)
          # For main and other PRs, use absolute 90% threshold
          if [[ "$BRANCH_NAME" == m09-* ]] && [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "mode=non-regression" >> $GITHUB_OUTPUT
            echo "Using non-regression mode: compare PR HEAD vs PR BASE for branch: $BRANCH_NAME"
            
            # Get PR base commit SHA
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            echo "PR base SHA: $BASE_SHA"
            
            # Fetch base commit and compute baseline coverage
            git fetch origin "$BASE_SHA" --depth=1
            git checkout "$BASE_SHA"
            
            # Install dependencies for base commit (in case they differ)
            python -m pip install --upgrade pip --quiet
            pip install -e ".[dev]" --quiet
            
            # Run coverage on base commit
            python -m pytest --cov=src/renacechess --cov-report=term --cov-report=xml -q > /dev/null 2>&1 || true
            BASELINE_COV=$(python -m coverage report --format=total --precision=2 | tail -1 | awk '{print $NF}' | sed 's/%//')
            echo "Baseline coverage: ${BASELINE_COV}%"
            echo "baseline=${BASELINE_COV}" >> $GITHUB_OUTPUT
            
            # Return to PR HEAD and reinstall dependencies
            git checkout "${{ github.sha }}"
            python -m pip install --upgrade pip --quiet
            pip install -e ".[dev]" --quiet
            
          else
            echo "mode=absolute" >> $GITHUB_OUTPUT
            echo "threshold=90" >> $GITHUB_OUTPUT
            echo "Using absolute threshold: 90% for branch: $BRANCH_NAME"
          fi
      - name: Run tests and check coverage
        shell: bash
        run: |
          if [[ "${{ steps.coverage_check.outputs.mode }}" == "non-regression" ]]; then
            # Run tests with coverage (disable fail-under to allow extraction)
            python -m pytest --cov=src/renacechess --cov-report=term --cov-report=xml --cov-fail-under=0 -q
            PR_COV=$(python -m coverage report --format=total --precision=2 | tail -1 | awk '{print $NF}' | sed 's/%//')
            BASELINE_COV="${{ steps.coverage_check.outputs.baseline }}"
            
            echo "PR coverage: ${PR_COV}%"
            echo "Baseline coverage: ${BASELINE_COV}%"
            
            # Compare coverage using Python for floating point comparison
            if python -c "exit(0 if float('${PR_COV}') >= float('${BASELINE_COV}') else 1)"; then
              echo "✅ Coverage non-regression: ${PR_COV}% >= ${BASELINE_COV}%"
            else
              echo "❌ Coverage regression: ${PR_COV}% < ${BASELINE_COV}%"
              exit 1
            fi
          else
            # Use absolute threshold
            python -m pytest --cov-fail-under=${{ steps.coverage_check.outputs.threshold }}
          fi
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

