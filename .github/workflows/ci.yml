name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Debug format issue
        run: |
          echo "=== Git config ==="
          git config --list | grep -E "core\.(autocrlf|eol|safecrlf)" || echo "No line-ending config"
          cat .gitattributes || echo "No .gitattributes"
          echo "=== File stats ==="
          ls -la tests/test_m06_conditioning_buckets.py
          echo "=== Git blob hash ==="
          git ls-files -s tests/test_m06_conditioning_buckets.py
          git hash-object tests/test_m06_conditioning_buckets.py
          echo "=== File line endings and size ==="
          python -c "p=open('tests/test_m06_conditioning_buckets.py','rb').read(); print('CRLF:', p.count(b'\r\n'), 'LF:', p.count(b'\n') - p.count(b'\r\n'), 'Size:', len(p))"
          echo "=== First 10 lines ==="
          head -n 10 tests/test_m06_conditioning_buckets.py
          echo "=== Ruff format diff ==="
          ruff format --diff tests/test_m06_conditioning_buckets.py || true
          echo "=== End diff ==="
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: MyPy
        run: mypy src/renacechess

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

