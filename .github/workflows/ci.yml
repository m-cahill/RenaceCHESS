name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ensure clean checkout
        run: git checkout HEAD -- .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: MyPy
        run: mypy src/renacechess

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Determine coverage threshold
        id: coverage_threshold
        shell: bash
        run: |
          # M08 baseline coverage: 90.16%
          # For M09 PR (m09-* branches), use non-regression rule
          # For main and other PRs, use absolute 90% threshold
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if [[ "$BRANCH_NAME" == m09-* ]]; then
            echo "threshold=90.16" >> $GITHUB_OUTPUT
            echo "mode=non-regression" >> $GITHUB_OUTPUT
            echo "Using non-regression threshold: 90.16% (M08 baseline) for branch: $BRANCH_NAME"
          else
            echo "threshold=90" >> $GITHUB_OUTPUT
            echo "mode=absolute" >> $GITHUB_OUTPUT
            echo "Using absolute threshold: 90% for branch: $BRANCH_NAME"
          fi
      - name: Run tests
        run: |
          pytest --cov-fail-under=${{ steps.coverage_threshold.outputs.threshold }}
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

