  frozen-eval-v2-validation:
    name: Frozen Eval V2 Validation (M30)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate manifest schema
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          from renacechess.contracts.models import FrozenEvalManifestV2
          
          manifest_path = Path("data/frozen_eval_v2/manifest.json")
          if not manifest_path.exists():
              print(f"❌ Manifest not found at {manifest_path}")
              exit(1)
          
          with manifest_path.open() as f:
              data = json.load(f)
          
          try:
              manifest = FrozenEvalManifestV2.model_validate(data)
              print(f"✅ Manifest schema validation passed")
              print(f"   Schema version: {manifest.schema_version}")
              print(f"   Position count: {manifest.position_count}")
              print(f"   Synthetic: {manifest.synthetic}")
          except Exception as e:
              print(f"❌ Manifest schema validation failed: {e}")
              exit(1)
          EOF
      - name: Validate provenance schema
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          from renacechess.contracts.models import EvalSetProvenanceV1
          
          provenance_path = Path("data/frozen_eval_v2/provenance.json")
          if not provenance_path.exists():
              print(f"❌ Provenance not found at {provenance_path}")
              exit(1)
          
          with provenance_path.open() as f:
              data = json.load(f)
          
          try:
              provenance = EvalSetProvenanceV1.model_validate(data)
              print(f"✅ Provenance schema validation passed")
              print(f"   Version: {provenance.version}")
              print(f"   Generator: {provenance.generator_version}")
          except Exception as e:
              print(f"❌ Provenance schema validation failed: {e}")
              exit(1)
          EOF
      - name: Verify determinism hash
        run: |
          python << 'EOF'
          from pathlib import Path
          from renacechess.frozen_eval.generator_v2 import verify_frozen_eval_v2
          
          manifest_path = Path("data/frozen_eval_v2/manifest.json")
          if verify_frozen_eval_v2(manifest_path):
              print(f"✅ Determinism hash verification passed")
          else:
              print(f"❌ Determinism hash verification failed")
              exit(1)
          EOF
      - name: Verify shard integrity
        run: |
          python << 'EOF'
          import hashlib
          import json
          from pathlib import Path
          
          manifest_path = Path("data/frozen_eval_v2/manifest.json")
          with manifest_path.open() as f:
              manifest = json.load(f)
          
          errors = []
          for shard_ref in manifest["shardRefs"]:
              shard_path = Path("data/frozen_eval_v2") / shard_ref
              if not shard_path.exists():
                  errors.append(f"Missing shard: {shard_ref}")
                  continue
              
              shard_id = shard_ref.replace(".jsonl", "")
              expected_hash = manifest["shardHashes"].get(shard_id)
              if not expected_hash:
                  errors.append(f"No hash for shard: {shard_id}")
                  continue
              
              actual_hash = hashlib.sha256(shard_path.read_bytes()).hexdigest()
              if actual_hash != expected_hash:
                  errors.append(f"Hash mismatch for {shard_id}: expected {expected_hash[:16]}..., got {actual_hash[:16]}...")
          
          if errors:
              for e in errors:
                  print(f"❌ {e}")
              exit(1)
          else:
              print(f"✅ All {len(manifest['shardRefs'])} shards verified")
          EOF
      - name: Verify skill bucket minimums
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          
          manifest_path = Path("data/frozen_eval_v2/manifest.json")
          with manifest_path.open() as f:
              manifest = json.load(f)
          
          min_required = manifest["stratification"]["minPerSkillBucket"]
          errors = []
          
          for bucket, count in manifest["countsBySkillBucketId"].items():
              if count < min_required:
                  errors.append(f"Bucket {bucket} has {count} positions (min: {min_required})")
          
          if errors:
              for e in errors:
                  print(f"❌ {e}")
              exit(1)
          else:
              print(f"✅ All skill buckets meet minimum ({min_required})")
              for bucket, count in sorted(manifest["countsBySkillBucketId"].items()):
                  print(f"   {bucket}: {count}")
          EOF
      - name: Verify position count
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          
          manifest_path = Path("data/frozen_eval_v2/manifest.json")
          with manifest_path.open() as f:
              manifest = json.load(f)
          
          expected = manifest["stratification"]["totalPositions"]
          actual = manifest["positionCount"]
          
          if actual == expected:
              print(f"✅ Position count verified: {actual}")
          else:
              print(f"❌ Position count mismatch: expected {expected}, got {actual}")
              exit(1)
          EOF

  m31-schema-validation:
    name: M31 Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate TrainingConfigLockV1 schema
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          from datetime import UTC, datetime
          from renacechess.contracts.models import (
              TrainingConfigLockV1,
              HeadConfigV1,
              OptimizerConfigV1,
              SchedulerConfigV1,
          )
          
          print("Testing TrainingConfigLockV1 schema...")
          
          # Create a valid config lock
          policy_config = HeadConfigV1(
              model_type="BaselinePolicyV1",
              epochs=10,
              batch_size=32,
              learning_rate=0.001,
              seed=42,
              optimizer=OptimizerConfigV1(type="AdamW", weight_decay=0.01),
              scheduler=SchedulerConfigV1(enabled=False),
          )
          
          outcome_config = HeadConfigV1(
              model_type="OutcomeHeadV1",
              epochs=10,
              batch_size=32,
              learning_rate=0.001,
              seed=42,
          )
          
          config_lock = TrainingConfigLockV1(
              version="1.0",
              created_at=datetime.now(UTC),
              code_commit_sha="a" * 40,
              dataset_manifest_hash="sha256:" + "b" * 64,
              frozen_eval_manifest_hash="sha256:" + "c" * 64,
              policy_config=policy_config,
              outcome_config=outcome_config,
              determinism_hash="sha256:" + "d" * 64,
          )
          
          # Serialize and validate
          json_dict = config_lock.model_dump(mode="json", by_alias=True)
          
          # Check required fields
          required_fields = [
              "version", "createdAt", "codeCommitSha",
              "datasetManifestHash", "frozenEvalManifestHash",
              "policyConfig", "outcomeConfig", "determinismHash"
          ]
          
          for field in required_fields:
              assert field in json_dict, f"Missing required field: {field}"
          
          print("✅ TrainingConfigLockV1 schema validation passed")
          print(f"   Version: {config_lock.version}")
          print(f"   Policy epochs: {config_lock.policy_config.epochs}")
          print(f"   Outcome epochs: {config_lock.outcome_config.epochs}")
          EOF
      - name: Validate TrainingRunReportV1 schema
        run: |
          python << 'EOF'
          import json
          from datetime import UTC, datetime
          from renacechess.contracts.models import (
              TrainingRunReportV1,
              ExecutionEnvironmentV1,
              HeadRunSummaryV1,
              CheckpointReferenceV1,
          )
          
          print("Testing TrainingRunReportV1 schema...")
          
          now = datetime.now(UTC)
          
          environment = ExecutionEnvironmentV1(
              gpu_name="NVIDIA GeForce RTX 5090",
              cuda_version="12.8",
              torch_version="2.10.0",
              python_version="3.12.0",
              os="Windows 10",
          )
          
          policy_summary = HeadRunSummaryV1(
              head_type="policy",
              epochs_completed=10,
              epochs_target=10,
              final_loss=0.5,
              status="success",
          )
          
          outcome_summary = HeadRunSummaryV1(
              head_type="outcome",
              epochs_completed=10,
              epochs_target=10,
              final_loss=0.3,
              status="success",
          )
          
          checkpoint = CheckpointReferenceV1(
              checkpoint_id="m31-test-001",
              checkpoint_type="final",
              epoch=10,
              file_hash="sha256:" + "a" * 64,
              file_size_bytes=1024 * 1024 * 100,
              created_at=now,
          )
          
          report = TrainingRunReportV1(
              version="1.0",
              run_id="m31-ci-test",
              started_at=now,
              completed_at=now,
              status="success",
              config_lock_hash="sha256:" + "b" * 64,
              environment=environment,
              policy_run_summary=policy_summary,
              outcome_run_summary=outcome_summary,
              checkpoints=[checkpoint],
              total_wall_clock_seconds=3600.0,
              total_wall_clock_formatted="1h 0m 0s",
              determinism_hash="sha256:" + "c" * 64,
          )
          
          # Serialize and validate
          json_dict = report.model_dump(mode="json", by_alias=True)
          
          # Check required fields
          required_fields = [
              "version", "runId", "startedAt", "completedAt", "status",
              "configLockHash", "environment", "policyRunSummary",
              "outcomeRunSummary", "checkpoints", "determinismHash"
          ]
          
          for field in required_fields:
              assert field in json_dict, f"Missing required field: {field}"
          
          print("✅ TrainingRunReportV1 schema validation passed")
          print(f"   Run ID: {report.run_id}")
          print(f"   Status: {report.status}")
          print(f"   Checkpoints: {len(report.checkpoints)}")
          EOF
      - name: Run M31 unit tests
        run: |
          echo "Running M31 unit tests..."
          pytest tests/test_m31_training_run.py -v --tb=short --no-cov
      - name: Verify training dataset generator
        run: |
          python << 'EOF'
          import tempfile
          from pathlib import Path
          from datetime import UTC, datetime
          from renacechess.dataset.training_dataset_v2 import (
              generate_training_dataset_v2,
              verify_training_dataset_v2,
              M31_MIN_POSITIONS,
              M31_SELECTION_SEED,
          )
          
          print("Testing training dataset v2 generator...")
          
          with tempfile.TemporaryDirectory() as tmpdir:
              output_dir = Path(tmpdir) / "training_data"
              now = datetime(2026, 2, 3, 12, 0, 0, tzinfo=UTC)
              
              # Generate minimum viable dataset
              manifest = generate_training_dataset_v2(
                  output_dir=output_dir,
                  target_positions=M31_MIN_POSITIONS,
                  seed=M31_SELECTION_SEED,
                  created_at=now,
              )
              
              # Verify
              assert manifest.schema_version == "v2"
              total = sum(ref.records for ref in manifest.shard_refs)
              assert total == M31_MIN_POSITIONS
              
              # Verify integrity
              manifest_path = output_dir / "manifest.json"
              assert verify_training_dataset_v2(manifest_path)
              
              print(f"✅ Training dataset generator validation passed")
              print(f"   Positions: {total}")
              print(f"   Shards: {len(manifest.shard_refs)}")
          EOF

  m32-eval-pack-validation:
    name: M32 Eval Pack Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
