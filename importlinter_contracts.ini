[importlinter]
root_packages =
    renacechess

# Contracts must remain a pure data layer with no upward dependencies
# This is the critical invariant for RenaceCHESS contract stability

[importlinter:contract:contracts-isolation]
name = Contracts module must not import from application layers
type = forbidden
source_modules =
    renacechess.contracts
forbidden_modules =
    renacechess.features
    renacechess.eval
    renacechess.models
    renacechess.dataset
    renacechess.ingest
    renacechess.demo
    renacechess.cli
    renacechess.frozen_eval
    renacechess.conditioning
    renacechess.personality

# Personality modules are downstream consumers of truth, never producers
# See docs/contracts/PERSONALITY_SAFETY_CONTRACT_v1.md

[importlinter:contract:personality-isolation]
name = Personality module must not be imported by core modules
type = forbidden
source_modules =
    renacechess.contracts
    renacechess.eval
    renacechess.features
    renacechess.models
forbidden_modules =
    renacechess.personality

# Coaching modules are downstream consumers (like personality), never producers
# See docs/contracts/ADVICE_FACTS_CONTRACT_v1.md, ADR-COACHING-001.md

[importlinter:contract:coaching-isolation]
name = Coaching module must not be imported by core modules
type = forbidden
source_modules =
    renacechess.contracts
    renacechess.eval
    renacechess.features
    renacechess.models
forbidden_modules =
    renacechess.coaching

