[importlinter]
root_package = renacechess

# Fail fast: boundary violations are architectural errors
fail_on_import_error = true

[importlinter:contract:contracts_are_leaf_nodes]
name = Contracts must not depend on higher layers
type = forbidden
source_modules =
    renacechess.contracts
forbidden_modules =
    renacechess.features
    renacechess.models
    renacechess.eval
    renacechess.cli

rationale =
    Contracts and schemas define frozen semantics.
    They must remain pure and dependency-free with respect to
    feature extraction, models, evaluation, and orchestration.

---

[importlinter:contract:features_depend_only_on_contracts]
name = Features may depend only on contracts and utilities
type = forbidden
source_modules =
    renacechess.features
forbidden_modules =
    renacechess.models
    renacechess.training
    renacechess.eval
    renacechess.cli

rationale =
    Structural cognition features must be deterministic and reusable.
    They may not depend on training logic, evaluation logic, or orchestration.

---

[importlinter:contract:models_do_not_import_eval_or_cli]
name = Models must not depend on eval or CLI
type = forbidden
source_modules =
    renacechess.models
forbidden_modules =
    renacechess.eval
    renacechess.cli

rationale =
    Core model logic must remain independent of evaluation
    and orchestration layers to preserve reusability and testability.

---

[importlinter:contract:eval_does_not_import_training]
name = Eval must not depend on training internals
type = forbidden
source_modules =
    renacechess.eval
forbidden_modules =
    renacechess.training

rationale =
    Evaluation must operate on trained artifacts and feature extractors,
    not on training procedures or mutable training state.

---

[importlinter:contract:cli_is_orchestration_only]
name = CLI must not depend on training internals
type = forbidden
source_modules =
    renacechess.cli
forbidden_modules =
    renacechess.training

rationale =
    CLI is an orchestration surface.
    Training must be invoked explicitly and never via implicit imports.

